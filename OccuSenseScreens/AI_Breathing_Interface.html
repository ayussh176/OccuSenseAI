                        "error": "#ffb4ab",

                    spacing: {

<style>
        /* Custom utilities for specific 3D/Gradient needs that Tailwind arbitrary values make messy */
        .glass-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .vent-flip-hint {
            transform: rotateX(15deg);
            transform-origin: top;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col relative selection:bg-primary/30">
<!-- Layer 0/1: Atmosphere - Airflow Gradients -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<!-- Flowing air masses simulated with large blurred orbs -->
<div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] rounded-full bg-surface-tint/5 blur-[150px]"></div>
</div>
<!-- TopAppBar (Brand Anchor) -->
<header class="fixed top-0 w-full z-50 border-b border-white/10 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] bg-surface/30 backdrop-blur-md flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 max-w-7xl mx-auto left-0 right-0 glass-noise">
<div class="flex items-center justify-center p-2 rounded-full hover:bg-surface-bright/20 transition-colors text-on-surface-variant cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">vital_signs</span>
</div>
<h1 class="font-display-lg text-headline-md tracking-tighter text-primary">OccuSense AI</h1>
<div class="flex items-center justify-center p-2 rounded-full hover:bg-surface-bright/20 transition-colors text-on-surface-variant cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">psychology</span>
</div>
</header>
<!-- Signature 'AC Vent' Panel Hint -->
<div class="absolute top-16 left-0 w-full z-40 flex justify-center perspective-1000 pointer-events-none">
<div class="w-full max-w-3xl h-8 bg-surface-container/30 backdrop-blur-md border-b border-white/5 vent-flip-hint flex items-end justify-center pb-1 shadow-[0_10px_20px_rgba(0,0,0,0.4)]">
<!-- Vent louvers detail -->
<div class="flex gap-4 w-1/2 justify-center opacity-30">
<div class="w-full h-[1px] bg-primary-container"></div>
</div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-6">
<!-- Central AI Pulse / Brain -->
<div class="relative w-72 h-72 flex items-center justify-center mb-16">
<!-- Atmospheric Glows (Level 1/2) -->
<div class="absolute inset-0 rounded-full bg-primary/10 blur-[60px]"></div>
<div class="absolute inset-8 rounded-full bg-primary-container/20 blur-[30px]"></div>
<!-- Concentric rings representing data flow/RL state -->
<div class="absolute inset-4 rounded-full border border-primary/20"></div>
<div class="absolute inset-12 rounded-full border border-primary/40"></div>
<div class="absolute inset-20 rounded-full border border-primary/10 border-dashed"></div>
<!-- The Core 'Brain' (Level 3 depth) -->
<div class="relative w-28 h-28 rounded-full bg-gradient-to-tr from-surface-tint via-primary to-white shadow-[0_0_50px_rgba(138,235,255,0.4)] flex items-center justify-center">
<!-- Inner tactile well -->
<div class="w-24 h-24 rounded-full bg-surface-dim/40 backdrop-blur-sm shadow-[inset_0_4px_10px_rgba(0,0,0,0.5)] border-t border-white/20 flex items-center justify-center">
<!-- The pure light source -->
<div class="w-8 h-8 rounded-full bg-white blur-[6px] opacity-90 shadow-[0_0_20px_#ffffff]"></div>
</div>
</div>
</div>
<!-- Cinematic Text -->
<div class="flex flex-col items-center gap-4 text-center max-w-2xl">
<h2 class="font-headline-md text-headline-md text-on-surface tracking-wide" style="text-wrap: balance; text-shadow: 0 4px 20px rgba(0,0,0,0.5);">
                OccuSense AI is breathing with your building.
            </h2>
<div class="flex items-center gap-3 opacity-60">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<p class="font-data-mono text-data-mono text-primary-container tracking-widest uppercase">
                    System Initializing
                </p>
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="relative z-20 pb-16 pt-8 w-full flex justify-center">
<!-- Level 3 Tactile Glowing Button -->
<button class="group relative px-10 py-5 rounded-full bg-surface-container/50 backdrop-blur-[30px] border-t border-l border-white/20 border-b border-r border-black/50 shadow-[0_20px_50px_rgba(0,0,0,0.6),_0_0_30px_rgba(138,235,255,0.05)] hover:shadow-[0_20px_50px_rgba(0,0,0,0.6),_0_0_40px_rgba(138,235,255,0.2)] hover:-translate-y-1 transition-all duration-300 ease-out overflow-hidden glass-noise cursor-pointer">
<!-- Ambient hover glow inside button -->
<div class="absolute inset-0 bg-gradient-to-r from-primary/0 via-primary/10 to-primary/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<div class="relative flex items-center gap-4">
<span class="font-label-caps text-label-caps text-primary tracking-[0.15em]">Enter Building</span>
<span class="material-symbols-outlined text-primary text-sm group-hover:translate-x-1.5 transition-transform duration-300">login</span>
</div>
</button>
</div>
